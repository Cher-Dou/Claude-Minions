name: Daily EDC MDC Research Update

on:
  schedule:
    # 07:00 America/Los_Angeles during daylight saving time.
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      report_date:
        description: "Optional report date, YYYY-MM-DD"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: daily-edc-mdc-update
  cancel-in-progress: false

jobs:
  daily-update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements-cloud.txt

      - name: Run daily EDC/MDC update
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_REPORTS_FOLDER_ID: ${{ secrets.GOOGLE_REPORTS_FOLDER_ID }}
          NCBI_EMAIL: ${{ secrets.NCBI_EMAIL }}
          REPORT_DATE: ${{ inputs.report_date }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python scripts/daily_edc_mdc_cloud_update.py

      - name: Upload Markdown report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-edc-mdc-report
          path: outputs/*.md
          if-no-files-found: ignore
